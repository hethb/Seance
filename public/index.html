<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Séance — talk to anything</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <main>
      <h1>🔮 Séance</h1>
      <p class="sub">Point at anything. Wake it up. Have a chat.</p>

      <!-- STAGE 1: camera -->
      <section id="camera-stage">
        <video id="video" autoplay playsinline muted></video>
        <button id="awaken-btn" class="primary">Awaken what I'm pointing at</button>
        <p id="hint" class="hint">Allow camera access, then frame an object.</p>
      </section>

      <!-- STAGE 2: the awakened character -->
      <section id="character-stage" hidden>
        <div class="portrait-wrap">
          <img id="portrait" alt="awakened character" />
          <div id="speaking-ring"></div>
        </div>
        <h2 id="char-name"></h2>
        <p id="char-tagline" class="tagline"></p>
        <p id="encounter-note" class="encounter"></p>

        <div id="transcript" class="transcript"></div>

        <div class="controls">
          <button id="talk-btn" class="primary">Hold to talk</button>
          <form id="text-form" class="text-fallback">
            <input id="text-input" type="text" placeholder="…or type to it" autocomplete="off" />
            <button type="submit">Send</button>
          </form>
          <button id="reset-btn" class="ghost">Awaken something else</button>
        </div>
      </section>

      <canvas id="canvas" hidden></canvas>
      <audio id="player" hidden></audio>
    </main>
    <script type="module" src="/app.js"></script>
  </body>
</html>
